journeys {

  automatched-organisation-with-id-journey = {
    description = "Automatched Organisation Journey"
    load = 0.00070
    parts = [
      OrgWithCtUtrAutoMatched
    ]
  }

    non-automatched-organisation-with-id-journey = {
      description = "Non-automatched Organisation with ID Journey"
      load = 0.00070
      parts = [
        OrgWithCtUtrNonAutoMatched
      ]
    }

  individual-with-nino-journey = {
    description = "Individual with Nino Journey"
    load = 0.00070
    parts = [
      IndWithNino
    ]
  }

    sole-trader-with-utr-journey = {
      description = "Sole Trader with UTR Journey"
      load = 0.00070
      parts = [
        SoleTraderWithUtr
      ]
    }
}


# Default behaviour is to run all journeys. If that is not what you need you can specify the list of journeys to run
#journeysToRun = [
#individual journey
#]

# You can specify the same list of journeys via environment variables:
# journeysToRun.0 = hello-world-1
# journeysToRun.1 = hello-world-3
